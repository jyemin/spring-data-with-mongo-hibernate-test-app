spring.application.name=spring-with-hibernate-mongo-test-app
# Activate the MongoDB JPA integration. With this set, the starter auto-configures the JPA
# EntityManagerFactory, a JpaTransactionManager, and Spring Data JPA repositories backed by MongoDB.
spring.jpa.database-platform=MongoDB
# Configure the connection the standard Spring Boot way (spring.mongodb.*). The integration borrows this
# Spring-managed MongoClient rather than opening its own, so there is a single shared connection pool.
spring.mongodb.uri=mongodb://localhost/mongo-hibernate-test?directConnection=false
# Standard Spring Boot JPA property (NOT the raw spring.jpa.properties.hibernate.show_sql passthrough):
# the starter honors the full spring.jpa.* surface.
spring.jpa.show-sql=true
# Actuator: expose health and metrics so the single borrowed MongoClient's connection pool is visible
# (e.g. /actuator/health and /actuator/metrics/mongodb.driver.pool.size).
management.endpoints.web.exposure.include=health,metrics
management.endpoint.health.show-details=always
